<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Blood Bank</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ADMIN ACCESS PROTECTION -->
<script>

    if (localStorage.getItem("USER_ROLE") !== "admin") {

        alert("Unauthorized access! Please login as admin.");

        window.location.href = "admin-login.html";
    }

</script>

<div class="container">

    <!-- NAVBAR -->
    <div class="navbar">

        <h1>🏥 Hospital Admin</h1>

        <span class="tag">Blood Bank</span>

    </div>

    <p class="subtitle">
        Manage donors and emergency requests.
    </p>

    <!-- EMERGENCY ALERT -->
    <button class="donate-btn" onclick="sendEmergencyAlert()">

        🚨 Emergency Alert

    </button>

    <div id="messageBox"></div>

    <!-- DASHBOARD -->
    <div class="dashboard">

        <div class="card">

            <h3>Blood Distribution</h3>

            <canvas id="bloodChart"></canvas>

        </div>

        <div class="card">

            <h3>Total Donors</h3>

            <p id="totalDonors">0</p>

            <h3>Blood Groups</h3>

            <ul id="bloodStats"></ul>

        </div>

    </div>

    <!-- SEARCH -->
    <h2>Search Donors</h2>

    <select id="searchBloodGroup" onchange="searchDonors()">

        <option value="">All Blood Groups</option>

        <option>A+</option>
        <option>A-</option>

        <option>B+</option>
        <option>B-</option>

        <option>O+</option>
        <option>O-</option>

        <option>AB+</option>
        <option>AB-</option>

    </select>

    <!-- DONOR TABLE -->
    <h2>Registered Donors</h2>

    <table id="donorTable">

        <thead>

            <tr>

                <th>Name</th>

                <th>Age</th>

                <th>Blood Group</th>

                <th>City</th>

                <th>Contact</th>

                <th>Action</th>

            </tr>

        </thead>

        <tbody></tbody>

    </table>

    <!-- SAVED DONOR LIST -->
    <h2>Saved Donor Records</h2>

    <div id="donorList"></div>

</div>

<!-- CHART JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- MAIN SCRIPT -->
<script src="script.js"></script>

</body>
</html>
